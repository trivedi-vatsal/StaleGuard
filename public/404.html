<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>StaleGuard · Not found</title>
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #111113;
        --border: rgba(255, 255, 255, 0.07);
        --text: #f0ede8;
        --muted: #8b8993;
        --accent: #c8f562;
        --mono: "JetBrains Mono", ui-monospace, monospace;
        --sans: "Segoe UI", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        padding: 24px;
      }

      .panel {
        width: min(100%, 680px);
        border: 1px solid var(--border);
        background: var(--surface);
        padding: 32px;
      }

      .eyebrow,
      a {
        font-family: var(--mono);
      }

      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 12px;
        font-size: clamp(2rem, 8vw, 3.75rem);
        line-height: 0.95;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.7;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="eyebrow">404</div>
      <h1>Page not found.</h1>
      <p>
        This static build could not find the requested page. If you expected the
        article or demo, head back to the StaleGuard homepage.
      </p>
      <a href="./">Return home →</a>
    </main>
  </body>
</html>
